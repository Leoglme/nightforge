<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" role="img" aria-label="NightForge">
  <defs>
    <linearGradient id="moonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0b85a"/>
      <stop offset="100%" stop-color="#e8a33c"/>
    </linearGradient>
  </defs>
  <!-- Dark backdrop (matches app sidebar) -->
  <rect width="240" height="56" rx="12" fill="#141418"/>
  <!-- Icon box -->
  <rect x="12" y="8" width="40" height="40" rx="10" fill="#1a1a1f" stroke="#2e2e36" stroke-width="1"/>
  <!-- Moon + star -->
  <path d="M34 18a8 8 0 1 0 0 16 6.5 6.5 0 0 1 0-16z" fill="url(#moonGlow)"/>
  <circle cx="39" cy="20" r="1.2" fill="#f5d08a"/>
  <!-- Wordmark: Night (white) + Forge (gold) -->
  <text x="64" y="35" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="600" letter-spacing="-0.5" fill="#f0f0f2">Night</text>
  <text x="120" y="35" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="500" font-style="italic" letter-spacing="-0.5" fill="#ecb865">Forge</text>
</svg>
